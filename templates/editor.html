<!-- templates/editor.html -->
{% extends 'layout.html' %}

{% block title %}HTML Editor{% endblock %}

{% block extra_head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/editor.css') }}">
{% endblock %}

{% block content %}
<div class="container">
    <!-- Left Sidebar: Elements & Controls -->
    <div class="left">
        <div class="toolbar">
            <h2>Toolbar</h2>
            <div class="toolbar-actions">
                <button id="loadGeneratedBtn" class="toolbar-btn primary">
                    <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                        <polyline points="7 10 12 15 17 10" />
                        <line x1="12" y1="15" x2="12" y2="3" />
                    </svg>
                    Load Generated
                </button>
                <button id="exportCodeBtn" class="toolbar-btn secondary">
                    <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z" />
                        <polyline points="17 21 17 13 7 13 7 21" />
                        <polyline points="7 3 7 8 15 8" />
                    </svg>
                    Export Code
                </button>
                <button id="clearAllBtn" class="toolbar-btn danger">
                    <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polyline points="3 6 5 6 21 6" />
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" />
                    </svg>
                    Clear All
                </button>
            </div>
        </div>

        <div class="tags-section">
            <h3>HTML Elements</h3>
            <div id="tagButtonList" class="tag-button-list">
                <!-- Dynamically generated tag buttons -->
            </div>
        </div>

        <div id="tagDetailsPanel" class="tag-details-panel" style="display: none;">
            <div class="details-header">
                <h3 id="selectedTagName"></h3>
                <button id="closeDetailsBtn" class="close-btn">×</button>
            </div>
            <div id="tagDetails" class="tag-details">
                <!-- Dynamically generated tag details -->
            </div>
            <div class="details-footer">
                <button id="applyUpdatesBtn" class="apply-btn">
                    <svg class="btn-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2">
                        <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Apply Changes
                </button>
            </div>
        </div>
    </div>

    <!-- Right Panel: Live Preview -->
    <div class="right">
        <div class="preview-header">
            <h2>Live Preview</h2>
            <div class="preview-controls">
                <button id="refreshPreviewBtn" class="icon-btn" title="Refresh Preview">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                    </svg>
                </button>
                <button id="toggleDeviceBtn" class="icon-btn" title="Toggle Device Frame">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
                        <line x1="12" y1="18" x2="12.01" y2="18" />
                    </svg>
                </button>
            </div>
        </div>

        <div id="previewBox" class="preview-container">
            <!-- Reference Image (Floating & Draggable) -->
            <div id="referenceImageContainer"
                style="display: none; position: absolute; top: 20px; right: 20px; width: 280px; z-index: 100; background: white; padding: 0; border-radius: 12px; border: 1px solid var(--border-color); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); cursor: move; overflow: hidden; user-select: none;">
                <div id="refHeader"
                    style="padding: 10px 14px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; cursor: grab;">
                    <span
                        style="font-size: 0.75rem; font-weight: 600; color: #475569; display: flex; align-items: center; gap: 8px;">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <path d="M5 9l7 7 7-7" />
                        </svg>
                        Reference Design
                    </span>
                    <button id="toggleRefBtn"
                        style="background: none; border: none; color: #94a3b8; cursor: pointer; padding: 4px; border-radius: 4px; display: flex; transition: all 0.2s;">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5">
                            <line x1="18" y1="6" x2="6" y2="18"></line>
                            <line x1="6" y1="6" x2="18" y2="18"></line>
                        </svg>
                    </button>
                </div>
                <div style="padding: 10px;">
                    <img id="referenceImg"
                        style="width: 100%; border-radius: 8px; display: block; border: 1px solid #f1f5f9; pointer-events: none;">
                </div>
            </div>
            <iframe id="previewFrame" sandbox></iframe>
        </div>

        <button id="showRefBtn"
            style="position: fixed; bottom: 30px; right: 30px; z-index: 1000; width: 60px; height: 60px; border-radius: 30px; background: white; border: 1px solid var(--border-color); color: var(--text-primary); cursor: pointer; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); display: none; align-items: center; justify-content: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2" />
                <circle cx="8.5" cy="8.5" r="1.5" />
                <polyline points="21 15 16 10 5 21" />
            </svg>
        </button>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script src="{{ url_for('static', filename='js/editor.js') }}"></script>
{% endblock %}
